name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 1. Install deps
      - run: npm install

      # 2. FORCE web build (important)
      - run: |
          mkdir -p www
          cp -r * www/ || true

      # 3. Capacitor sync AFTER web exists
      - run: npx cap sync android

      # 4. Java setup
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 5. Build APK
      - run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 6. Upload APK
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
