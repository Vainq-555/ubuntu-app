name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Java MUST come first (Capacitor + Gradle depend on it)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      # build web assets properly
      - run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ || true
          cp sw.js www/ || true
          cp IMG-*.jpg www/ || true

      # Capacitor sync AFTER Java exists
      - run: npx cap sync android

      # build APK
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
